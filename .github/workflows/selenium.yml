name: Selenium Test / Scraper

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # 手动触发
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 2点运行（根据需要调整）

jobs:
  selenium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'   # 或你需要的版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1   # 推荐 Action，自动安装 Chrome + ChromeDriver
        with:
          chrome-version: 147  # 锁定一个稳定的旧版本，或者你尝试 148
      - name: Run Selenium script
        run: python your_script.py
        env:
          # 如果需要，可以在这里传 secrets
          SOME_SECRET: ${{ secrets.SOME_SECRET }}

      - name: Upload Selenium screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          # 查找所有子目录下的 png 文件（更全面）
          # 如果你创建了 screenshots 文件夹
          path: |
            screenshots/
            *.*   
          retention-days: 7
          if-no-files-found: warn